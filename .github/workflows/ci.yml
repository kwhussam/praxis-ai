name: CI

on: [push, pull_request]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify
        run: npm run verify
        env:
          SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          TEST_PRACTICE_A_EMAIL: ${{ secrets.TEST_PRACTICE_A_EMAIL }}
          TEST_PRACTICE_A_PASSWORD: ${{ secrets.TEST_PRACTICE_A_PASSWORD }}
          TEST_PRACTICE_B_ID: ${{ secrets.TEST_PRACTICE_B_ID }}

  rls-pgtap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - name: Start local Supabase
        run: supabase start
      - name: Run cross-tenant RLS pgTAP tests
        run: supabase db test --local supabase/tests/rls_cross_tenant.sql
