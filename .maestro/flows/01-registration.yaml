appId: ai.praxisshield.app
name: 01-registration
tags:
  - ui-e2e
---
- launchApp:
    clearState: true
    clearKeychain: true
    permissions:
      all: allow
- extendedWaitUntil:
    visible:
      id: auth-switch-mode
    timeout: 30000
- evalScript: ${output.registrationEmail = "registration-" + Date.now() + "@example.test"}
- tapOn:
    id: auth-switch-mode
- tapOn:
    id: auth-email
- inputText: "${output.registrationEmail}"
- tapOn:
    id: auth-password
- inputText: "${TEST_PASSWORD}"
- hideKeyboard
- tapOn:
    id: auth-submit
- extendedWaitUntil:
    visible:
      id: onboarding-screen
    timeout: 30000
- assertVisible: "Ihre Praxis. Geschützt."
- assertNotVisible:
    id: auth-error
