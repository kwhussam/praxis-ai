appId: ai.praxisshield.app
name: 03-login-invalid
tags:
  - ui-e2e
---
- launchApp:
    clearState: true
    clearKeychain: true
    permissions:
      all: allow
- extendedWaitUntil:
    visible:
      id: auth-email
    timeout: 30000
- tapOn:
    id: auth-email
- inputText: owner-a@example.test
- tapOn:
    id: auth-password
- inputText: Definitely-Wrong-Password
- hideKeyboard
- tapOn:
    id: auth-submit
- extendedWaitUntil:
    visible:
      id: auth-error
    timeout: 15000
- assertNotVisible:
    id: tab-dashboard
