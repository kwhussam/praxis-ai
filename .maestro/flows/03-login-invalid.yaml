appId: ai.praxisshield.app
name: 03-login-invalid
tags:
  - ui-e2e
---
- runFlow: ../subflows/bootstrap.yaml
- tapOn:
    id: auth-email
- inputText: owner-a@example.test
- tapOn:
    id: auth-password
- inputText: Definitely-Wrong-Password
- pressKey: Enter
- tapOn:
    id: auth-submit
- extendedWaitUntil:
    visible:
      id: auth-error
    timeout: 15000
- assertNotVisible:
    id: tab-dashboard
