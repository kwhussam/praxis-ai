appId: ai.praxisshield.app
name: 04-onboarding
tags:
  - ui-e2e
---
- runFlow: ../subflows/bootstrap.yaml
- evalScript: ${output.onboardingSuffix = Date.now()}
- evalScript: ${output.onboardingDomain = "maestro-" + output.onboardingSuffix + ".example.test"}
- runScript: ../scripts/create-onboarding-user.js
- assertTrue:
    condition: ${output.onboardingUser.status === 200 && output.onboardingUser.hasSession === true}
    label: Confirmed practice-less onboarding user is created
- runFlow:
    file: ../subflows/login-to-onboarding.yaml
    env:
      EMAIL: "${output.onboardingUser.email}"
      PASSWORD: "${output.onboardingUser.password}"
- extendedWaitUntil:
    visible:
      id: onboarding-next
    timeout: 30000
- tapOn:
    id: onboarding-next
- tapOn:
    id: onboarding-next
- scrollUntilVisible:
    element:
      id: onboarding-domain
    direction: DOWN
    timeout: 30000
    visibilityPercentage: 50
    centerElement: true
- tapOn:
    id: onboarding-domain
- inputText: "${output.onboardingDomain}"
- pressKey: Enter
- scrollUntilVisible:
    element:
      id: onboarding-submit
    direction: DOWN
    speed: 70
    timeout: 30000
    visibilityPercentage: 20
- tapOn:
    id: onboarding-submit
- extendedWaitUntil:
    visible:
      id: tab-dashboard
    timeout: 30000
- assertVisible: "Noch keine echten Prüfdaten vorhanden."
