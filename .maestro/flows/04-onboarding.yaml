appId: ai.praxisshield.app
name: 04-onboarding
tags:
  - ui-e2e
---
- launchApp:
    clearState: true
    clearKeychain: true
    permissions:
      all: allow
- extendedWaitUntil:
    visible:
      id: auth-switch-mode
    timeout: 30000
- evalScript: ${output.onboardingSuffix = Date.now()}
- evalScript: ${output.onboardingEmail = "onboarding-" + output.onboardingSuffix + "@example.test"}
- evalScript: ${output.onboardingDomain = "maestro-" + output.onboardingSuffix + ".example.test"}
- tapOn:
    id: auth-switch-mode
- tapOn:
    id: auth-email
- inputText: "${output.onboardingEmail}"
- tapOn:
    id: auth-password
- inputText: "${TEST_PASSWORD}"
- hideKeyboard
- tapOn:
    id: auth-submit
- extendedWaitUntil:
    visible:
      id: onboarding-next
    timeout: 30000
- tapOn:
    id: onboarding-next
- tapOn:
    id: onboarding-next
- tapOn:
    id: onboarding-domain
- inputText: "${output.onboardingDomain}"
- hideKeyboard
- tapOn:
    id: onboarding-submit
- extendedWaitUntil:
    visible:
      id: tab-dashboard
    timeout: 30000
- assertVisible: "Noch keine echten Prüfdaten vorhanden."
