appId: ai.praxisshield.app
name: 06-wlan-scan
tags:
  - ui-e2e
---
- runFlow: ../subflows/bootstrap.yaml
- runFlow:
    file: ../subflows/login.yaml
    env:
      EMAIL: owner-a@example.test
      PASSWORD: "${TEST_PASSWORD}"
- runFlow: ../subflows/open-questionnaire.yaml
- runFlow: ../subflows/submit-questionnaire.yaml
- runFlow: ../subflows/prepare-wlan-scan.yaml
- tapOn:
    id: wlan-start
- extendedWaitUntil:
    visible:
      id: wlan-complete
    timeout: 120000
- extendedWaitUntil:
    notVisible:
      id: wlan-sync-pending
    timeout: 30000
- assertVisible:
    id: wlan-results
- runScript:
    file: ../scripts/verify-wlan-sync.js
    env:
      EMAIL: owner-a@example.test
      PASSWORD: "${TEST_PASSWORD}"
      PRACTICE_ID: 20000000-0000-4000-8000-0000000000a1
- assertTrue:
    condition: ${output.wlanSync.scanPersisted === true}
    label: WLAN scan is persisted in the real backend
- assertTrue:
    condition: ${output.wlanSync.consentPersisted === true}
    label: WLAN consent is persisted in the real backend
