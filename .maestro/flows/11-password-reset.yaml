appId: ai.praxisshield.app
name: 11-password-reset
tags:
  - ui-e2e
---
- runFlow: ../subflows/bootstrap.yaml
- evalScript: ${output.unknownEmail = "unknown-" + Date.now() + "@example.test"}
- tapOn:
    id: auth-email
- inputText: "${output.unknownEmail}"
- pressKey: Enter
- tapOn:
    id: auth-forgot-password
- extendedWaitUntil:
    visible:
      id: auth-notice
    timeout: 30000
- assertVisible: "Falls ein Konto zu dieser E-Mail existiert, wurde ein Link zum Zurücksetzen versendet."
- assertNotVisible:
    id: auth-error
