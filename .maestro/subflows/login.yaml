appId: ai.praxisshield.app
---
- launchApp:
    clearState: true
    clearKeychain: true
    permissions:
      all: allow
- extendedWaitUntil:
    visible:
      id: auth-email
    timeout: 30000
- tapOn:
    id: auth-email
- inputText: "${EMAIL}"
- tapOn:
    id: auth-password
- inputText: "${PASSWORD}"
- hideKeyboard
- tapOn:
    id: auth-submit
- extendedWaitUntil:
    visible:
      id: tab-dashboard
    timeout: 30000
